# Profit of power plant, defined as revenue minus CAPEX and OPEX

- query =
  IF(
       V(energy_power_turbine_network_gas_dispatchable, output_of_electricity) == 0,
       -> { '-' },
       -> { Q(gas_turbine_dispatchable_revenue_in_power_plant_economic_performance_table) -  Q(gas_turbine_dispatchable_capex_in_power_plant_economic_performance_table)  -  Q(gas_turbine_dispatchable_opex_in_power_plant_economic_performance_table) }
  )
- unit = EUR/MWh
