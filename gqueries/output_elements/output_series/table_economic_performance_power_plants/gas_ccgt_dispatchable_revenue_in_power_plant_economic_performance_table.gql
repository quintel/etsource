# Revenue of power plant, based on hourly revenue calculations

- query =
   IF(
       V(energy_power_combined_cycle_network_gas_dispatchable, output_of_electricity) == 0,
       -> { '-' },
       -> { V(energy_power_combined_cycle_network_gas_dispatchable, revenue_per(:mwh_electricity)) }
   )
- unit = EUR/MWh
