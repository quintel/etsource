
# Energetic final demand of electricity in households excluding heating

- unit = PJ
- query =
    DIVIDE(
      SUM(
        Q(final_demand_of_electricity_in_buildings_appliances_energetic),
        Q(final_demand_of_electricity_in_buildings_cooling_energetic),
        Q(final_demand_of_electricity_in_buildings_lighting_energetic),
        Q(final_demand_of_electricity_in_buildings_cooking_energetic)
        ), 
      BILLIONS
    )


