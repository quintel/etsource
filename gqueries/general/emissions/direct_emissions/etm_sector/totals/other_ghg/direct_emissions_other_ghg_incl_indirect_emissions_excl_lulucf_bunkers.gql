# Total other GHG emissions incl. indirect emissions, excl. LULUCF and international transport

- unit = MT
- query =
    SUM(
      Q(direct_emissions_other_ghg_incl_indirect_emissions_lulucf_bunkers),
      NEG(Q(direct_emissions_lulucf_other_ghg)),
      NEG(Q(direct_emissions_bunkers_other_ghg))
    )
