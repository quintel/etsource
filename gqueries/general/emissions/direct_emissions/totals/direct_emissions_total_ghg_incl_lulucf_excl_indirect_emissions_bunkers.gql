# Total GHG emissions incl. LULUCF, excl indirect emissions and international transport

- unit = mt
- query =
    SUM(
      Q(direct_emissions_total_ghg_incl_indirect_emissions_lulucf_bunkers),
      NEG(Q(direct_emissions_indirect_emissions_total_ghg)),
      NEG(Q(direct_emissions_bunkers_total_ghg))
    )
