      Q(direct_emissions_ipcc_1b_total_ghg),
      Q(direct_emissions_ipcc_1c_total_ghg),
      Q(direct_emissions_ipcc_1d1_total_ghg),
      Q(direct_emissions_ipcc_2_total_ghg),
      Q(direct_emissions_ipcc_3_total_ghg),
      Q(direct_emissions_ipcc_4_total_ghg),
      Q(direct_emissions_ipcc_5_total_ghg),
