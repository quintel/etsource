# Total GHG emissions for 1990 incl. indirect emissions (ind_co2) and LULUCF (4), excl.
# international transport (1.D.1)

- unit = MT
- query =
    SUM(
      Q(direct_emissions_ipcc_total_ghg_incl_indirect_emissions_lulucf_bunkers_1990),
      NEG(Q(direct_emissions_ipcc_1d1_total_ghg_1990))
    )
