# Returns the capacity of ultra supercritical cofiring mt coal plants with ccsfor the sector energy.
- query = 
        PRODUCT(
  		V(energy_chp_ultra_supercritical_cofiring_mt_coal,number_of_units),
  		V(energy_chp_ultra_supercritical_cofiring_mt_coal,electricity_output_capacity)	
  		)
- unit = MW

