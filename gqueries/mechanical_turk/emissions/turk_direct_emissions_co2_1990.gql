# Mechanical turk query for 1990 CO2 emissions
# Sums all co2 values for 1990 from emissions.csv
# Bunkers is handled separately as the result depends on the set input for bunkers

- unit = mt
- query =
    SUM(
      DIVIDE(
        SUM(
          EMISSIONS(agriculture_non_specified, energetic, co2, 1990),
          EMISSIONS(agriculture_non_specified, non_energetic, co2, 1990),
          EMISSIONS(buildings_non_specified, energetic, co2, 1990),
          EMISSIONS(energy_ccus, non_energetic, co2, 1990),
          EMISSIONS(energy_electricity_and_heat_production, energetic, co2, 1990),
          EMISSIONS(energy_fuels_production, energetic, co2, 1990),
          EMISSIONS(energy_fugitive_emissions, non_energetic, co2, 1990),
          EMISSIONS(energy_hydrogen_production, non_energetic, co2, 1990),
          EMISSIONS(energy_methanol_production, non_energetic, co2, 1990),
          EMISSIONS(households_non_specified, energetic, co2, 1990),
          EMISSIONS(industry_aluminium, non_energetic, co2, 1990),
          EMISSIONS(industry_chemicals, non_energetic, co2, 1990),
          EMISSIONS(industry_fertilizers, non_energetic, co2, 1990),
          EMISSIONS(industry_food, non_energetic, co2, 1990),
          EMISSIONS(industry_non_specified, energetic, co2, 1990),
          EMISSIONS(industry_other_metals, non_energetic, co2, 1990),
          EMISSIONS(industry_other, non_energetic, co2, 1990),
          EMISSIONS(industry_paper, non_energetic, co2, 1990),
          EMISSIONS(industry_refineries, energetic, co2, 1990),
          EMISSIONS(industry_refineries, non_energetic, co2, 1990),
          EMISSIONS(industry_steel, non_energetic, co2, 1990),
          EMISSIONS(lulucf_emissions, non_energetic, co2, 1990),
          NEG(EMISSIONS(lulucf_removals, non_energetic, co2, 1990)),
          EMISSIONS(other_indirect_emissions, non_energetic, co2, 1990),
          EMISSIONS(other_non_specified, energetic, co2, 1990),
          EMISSIONS(other_other_transportation, energetic, co2, 1990),
          EMISSIONS(transport_non_specified, energetic, co2, 1990),
          EMISSIONS(waste_non_specified, non_energetic, co2, 1990)
        ),
        THOUSANDS
      ),
      Q(direct_emissions_bunkers_co2_1990)
    )
