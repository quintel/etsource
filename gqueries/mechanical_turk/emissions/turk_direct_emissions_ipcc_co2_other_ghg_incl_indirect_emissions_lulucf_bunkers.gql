# Sum of total CO2 and other GHG emissions IPCC categories incl. indirect emissions (ind_CO2),
# LULUCF (4) and international transport (1.D.1)

- unit = MT
- query =
    SUM(
      Q(direct_emissions_ipcc_co2_incl_indirect_emissions_lulucf_bunkers),
      Q(direct_emissions_ipcc_other_ghg_incl_indirect_emissions_lulucf_bunkers)
    )
